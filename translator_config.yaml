# Единый конфиг параметров переводчика AutoPlanBench (sembenchrunning).
#
# Приоритет: переменная окружения > этот файл > встроенные значения в translator_settings.py
# Путь к файлу: по умолчанию рядом с translator_settings.py; переопределение:
#   SEMBENCH_TRANSLATOR_CONFIG=/path/to/custom.yaml
#   или флаг --translator-config у run_benchmark / prepare_autoplanbench_data
#
# Секции:
#   domain_setup — run_domain_setup.py (PDDL→NL для домена)
#     openrouter_parallel_timeout_seconds → env OPENROUTER_PARALLEL_HTTP_TIMEOUT_S в субпроцессе APB
#   nl2pddl      — run_translate_nl2pddl.py (NL-план → PDDL)
#   pddl2nl_sample — run_save_descriptions.py --type full (промпт сэмпла)

version: 1

domain_setup:
  llm: "openai/gpt-oss-120b"
  max_tokens: 50000
  parallel: 80
  timeout_seconds: 60000
  # Один запрос в APB parallel HTTP (urllib read); см. OPENROUTER_PARALLEL_HTTP_TIMEOUT_S
  openrouter_parallel_timeout_seconds: 60000

nl2pddl:
  model_path: "openai/gpt-oss-120b"
  max_tokens: 50000
  parallel: 80
  timeout_seconds: 60000
  openrouter_parallel_timeout_seconds: 60000
  # null = шаблон по умолчанию внутри AutoPlanBench (llm_planning/prompt_templates/translation_template.txt)
  prompt_file: null
  examples_file: null

pddl2nl_sample:
  timeout_seconds: 60000
