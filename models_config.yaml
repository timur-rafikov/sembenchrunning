openrouter:
  # Основные настройки доступа к OpenRouter
  api_base: "https://openrouter.ai/api/v1/chat/completions"
  # Имя переменной окружения, из которой берётся API‑ключ
  api_key_env: "OPENROUTER_API_KEY"

  # Необязательные заголовки для атрибуции приложения на OpenRouter
  http_referer: null        # например: "https://your-site-or-repo.example"
  x_title: "sembenchrunning"

  # Ограничения и сетевые настройки
  # Делаем таймаут достаточно большим, чтобы дать моделям
  # время "подумать" (10 минут). При желании можно поднять ещё.
  timeout_seconds: 600
  max_concurrent_requests: 80
  max_retries: 3
  retry_backoff_seconds: 2.0

models:
  # Ключи в этом словаре совпадают с идентификаторами моделей в OpenRouter.
  # Эти же строки нужно передавать в CLI как --model.

  "openai/gpt-5-mini":
    model: "openai/gpt-5-mini"
    # Явно задаём max_tokens для OpenRouter.
    max_output_tokens: 20000
    # Температура для всех моделей: 0.3
    temperature: 0.3
    reasoning: "high"

  "anthropic/claude-sonnet-4-6":
    model: "anthropic/claude-sonnet-4-6"
    max_output_tokens: 4096
    temperature: 0.3
    reasoning: null

  "meta-llama/llama-3.3-70b-instruct":
    model: "meta-llama/llama-3.3-70b-instruct"
    max_output_tokens: 4096
    temperature: 0.3
    reasoning: null

  "deepseek/deepseek-v3.2":
    model: "deepseek/deepseek-v3.2"
    max_output_tokens: 4096
    temperature: 0.3
    reasoning: null
  
  "minimax/minimax-m2.5":
    model: "minimax/minimax-m2.5"
    max_output_tokens: 40000
    temperature: 0.3

