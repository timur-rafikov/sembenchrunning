openrouter:
  # Основные настройки доступа к OpenRouter
  api_base: "https://openrouter.ai/api/v1/chat/completions"
  # Имя переменной окружения, из которой берётся API‑ключ
  api_key_env: "OPENROUTER_API_KEY"

  # Необязательные заголовки для атрибуции приложения на OpenRouter
  http_referer: null        # например: "https://your-site-or-repo.example"
  x_title: "sembenchrunning"

  # Ограничения и сетевые настройки
  # Делаем таймаут достаточно большим, чтобы дать моделям
  # время "подумать" (10 минут). При желании можно поднять ещё.
  timeout_seconds: 600
  max_concurrent_requests: 16
  max_retries: 3
  retry_backoff_seconds: 2.0

models:
  # Короткое имя модели (используется в CLI и коде)

  gpt5_mini:
    # Идентификатор GPT‑5 Mini в OpenRouter
    model: "openai/gpt-5-mini"
    # Лимит на длину ответа модели
    max_output_tokens: 4096
    # Температура для всех моделей: 0.3
    temperature: 0.3
    reasoning: null

  claude_sonnet_4_6:
    model: "anthropic/claude-sonnet-4-6"
    max_output_tokens: 4096
    temperature: 0.3
    reasoning: null

  llama3_3_70b:
    model: "meta-llama/llama-3.3-70b-instruct"
    max_output_tokens: 4096
    temperature: 0.3
    reasoning: null

  deepseek_v3_2:
    model: "deepseek/deepseek-v3.2"
    max_output_tokens: 4096
    temperature: 0.3
    reasoning: null

